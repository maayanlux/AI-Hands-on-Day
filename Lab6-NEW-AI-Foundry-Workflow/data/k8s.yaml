apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-update-app
  namespace: default
  labels:
    app: update-service
    version: "1.34.0" # This is the version your Foundry workflow will "read"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: update-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: update-service
    spec:
      containers:
        # Main Application Container
        - name: main-app
          image: myregistry.azurecr.io/k8s-app:v1.34.0 # Target for update
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

        # Sidecar Container (Logging/Metrics - now a stable primitive)
        - name: log-sidecar
          image: fluentd:v1.16
          resources:
            limits:
              memory: "128Mi"
              cpu: "100m"