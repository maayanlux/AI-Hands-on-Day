kind: workflow
trigger:
  kind: OnConversationStart
  id: trigger_wf
  actions:
    - kind: InvokeAzureAgent
      id: agent1
      agent:
        name: Agent-K8s-Release-Checker
      description: First agent in sequential workflow
      conversationId: =System.ConversationId
      input:
        messages: =System.LastMessage
      output:
        messages: Local.LatestMessage
        autoSend: true
    - kind: InvokeAzureAgent
      id: agent2
      agent:
        name: Agent-K8s-Change-Summarizer
      conversationId: =System.ConversationId
      description: Second agent in sequential workflow
      input:
        messages: =Local.LatestMessage
      output:
        text: Local.ChangeSummary
        autoSend: true
    - kind: InvokeAzureAgent
      id: action-1768761691925
      agent:
        name: Agent-Edit-Yaml
      conversationId: =System.ConversationId
      input:
        messages: '="The new release is: " & Local.ChangeSummary & ". Extract k8s.zip and update the yaml."'
      output:
        autoSend: true
        messages: Local.LatestMessage
    - kind: Question
      variable: Local.UserResponse
      id: action-1768373737442
      entity: StringPrebuiltEntity
      skipQuestionMode: SkipOnFirstExecutionIfVariableHasValue
      prompt: I have updated the YAML to the new version. Please review the code below. Reply 'Approve' to proceed or 'Reject' to cancel.
    - kind: ConditionGroup
      conditions:
        - condition: =Lower(Local.UserResponse) = "approve"
          actions:
            - kind: InvokeAzureAgent
              id: action-1768373985745
              agent:
                name: Agent-Upgrade-Notification
              input:
                messages: '="Please send an email that includes BOTH the Release Summary and the full updated YAML code: " & Local.ChangeSummary'
              output:
                autoSend: true
                messages: Local.LatestMessage
              conversationId: =System.ConversationId
          id: if-action-1768373825730-0
      id: action-1768373825730
      elseActions:
        - kind: InvokeAzureAgent
          id: action-1768376081875
          agent:
            name: Agent-Upgrade-Notification
          input:
            messages: '="Trigger the email now for version update. Release Summary: " & Local.ChangeSummary'
          output:
            autoSend: true
            messages: Local.LatestMessage
          conversationId: =System.ConversationId
    - kind: EndConversation
      id: action-1768376122841
id: ""
name: Workflow-K8S-Update
description: ""

